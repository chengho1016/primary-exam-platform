name: Web CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Lint, test, build, audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/web

    env:
      # CI 只做 schema validation / build，不連線真 DB；用 dummy URL 避免 Prisma config 缺 env。
      DATABASE_URL: postgresql://primary_exam:primary_exam@127.0.0.1:54329/primary_exam?schema=public
      SEED_ADMIN_PASSWORD: ci-admin-password
      SEED_PARENT_PASSWORD: ci-parent-password
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prisma schema validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=moderate

  root-audit:
    name: Root dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Audit root production dependencies
        run: npm audit --omit=dev --audit-level=moderate
